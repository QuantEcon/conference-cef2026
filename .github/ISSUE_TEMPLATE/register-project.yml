name: Register a project
description: Register your toolkit/project to participate in the Community Reference Library for Computational Economics.
title: "[Register] <project name>"
labels: ["registration", "project"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in the **Community Reference Library for Computational Economics**.

        Completing this form registers your project. Submissions are public — the open
        issues here form the live registry of participating projects. You keep credit and
        editorial control of your own content at all times.
  - type: input
    id: project
    attributes:
      label: Project / toolkit name
      placeholder: e.g. Dynare, HARK, sequence-jacobian
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository or homepage URL
      placeholder: https://github.com/...
    validations:
      required: true
  - type: input
    id: maintainer
    attributes:
      label: Lead maintainer / contact
      description: Name + email or GitHub handle
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Primary language(s)
      multiple: true
      options:
        - Python
        - Julia
        - MATLAB
        - C++
        - R
        - Other
    validations:
      required: true
  - type: checkboxes
    id: problem-classes
    attributes:
      label: Problem class(es) you'd coordinate around
      options:
        - label: Heterogeneous agents (Aiyagari, Krusell–Smith)
        - label: HANK
        - label: DSGE
        - label: Agent-based macro
        - label: Other / not sure yet
  - type: checkboxes
    id: contributions
    attributes:
      label: Willing to contribute, by end of 2026
      options:
        - label: A shared baseline model (coordinated across your group)
        - label: A hero tutorial (your author's-choice showcase)
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      placeholder: Optional — questions, constraints, ideas.
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: Our project authors and maintains its own content, and retains credit and editorial control.
          required: true
